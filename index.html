<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helios Gateway | The Truth-Seeker</title>
    <style>
        :root {
            --deep-slate: #0f172a;
            --sunlight-yellow: #facc15;
            --tech-white: #f8fafc;
            --accent-glow: rgba(250, 204, 21, 0.2);
        }

        body {
            background-color: var(--deep-slate);
            color: var(--tech-white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: s800px;
            padding: 40px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(248, 250, 252, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* Pulse Widget */
        .pulse-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--sunlight-yellow);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--sunlight-yellow);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--sunlight-yellow);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #ffffff, #facc15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .mission-statement {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-button {
            display: inline-block;
            padding: 16px 32px;
            background-color: var(--sunlight-yellow);
            color: var(--deep-slate);
            text-decoration: none;
            font-weight: 700;
            border-s-radius: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            box-shadow: 0 4px 14px 0 rgba(250, 204, 21, 0.39);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.5);
            background-color: #eab308;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Decorative Background Elements */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="pulse-container">
            <div class="pulse-dot"></div>
            System: Operational
        </div>

        <h1>HELIOS</h1>
        
        <div class="mission-statement">
            <p>To illuminate the shadows of misinformation through rigorous verification, unyielding transparency, and the pursuit of absolute clarity. We are the sentinels of the Truth-Seeker protocol.</p>
        </div>

        <a href="https://t.me/your_telegram_channel" class="cta-button">
            Join the Telegram Channel
        </a>

        <div class="footer">
            &copy; 2026 Helios Ecosystem &bull; Truth-Seeker Protocol
        </div>
    </div>
</body>
</html>
